<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>
  <!-- Outer glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Anvil/forge shape — stylized "AF" monogram using terminal aesthetic -->
  <!-- Left bracket < -->
  <polyline points="7,10 4,16 7,22" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="25,10 28,16 25,22" stroke="#ffb800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center spark / underscore cursor -->
  <line x1="12" y1="16" x2="20" y2="16" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cursor blink dot -->
  <circle cx="22" cy="16" r="1.5" fill="#00ff88"/>
</svg>
